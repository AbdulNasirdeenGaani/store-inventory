<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrical Store Inventory</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="topbar">
        <div class="logo">Electrical Store Inventory</div>
        <div class="top-actions">
            <button id="themeToggle" onclick="toggleTheme()">Dark Mode</button>
            <button id="logoutButton" onclick="logout()" class="hidden">Logout</button>
        </div>
    </div>

    <div class="auth-panel" id="loginPanel">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <div class="auth-note">Use admin/admin123 or staff/staff123</div>
    </div>

    <div class="app-grid hidden" id="appContainer">
        <section class="dashboard-panel">
            <div class="summary-card">
                <div>
                    <span>Total Products</span>
                    <strong id="summaryTotalItems">0</strong>
                </div>
                <div>
                    <span>Total Stock</span>
                    <strong id="summaryTotalStock">0</strong>
                </div>
                <div>
                    <span>Low Stock Alerts</span>
                    <strong id="summaryLowStock">0</strong>
                </div>
            </div>
            <div class="chart-card">
                <h3>Stock Remaining Chart</h3>
                <canvas id="stockChart"></canvas>
            </div>
        </section>

        <section class="controls-panel">
            <div class="search-row">
                <input type="search" id="searchQuery" placeholder="Search by name, number, or category" oninput="loadProducts()">
                <button onclick="exportExcel()">Export Excel</button>
                <button onclick="exportPDF()">Export PDF</button>
            </div>
            <div class="low-stock-alert" id="lowStockAlert"></div>

            <div class="form-container">
                <input type="hidden" id="productId">
                <!-- <input type="text" id="barcode" placeholder="Barcode / Scan Here"> -->
                <input type="text" id="name" placeholder="Product Name">
                <input type="text" id="category" placeholder="Category">
                <input type="number" id="originalStock" placeholder="Original Stock">
                <input type="number" id="stockRemaining" placeholder="Stock Remaining">
                <input type="number" id="reorderLevel" placeholder="Reorder Level">
                <button type="button" onclick="saveProduct()">Save Product</button>
                <button type="button" onclick="clearForm()" class="secondary">Clear</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Original</th>
                            <th>Remaining</th>
                            <th>Reorder Level</th>
                            <th>Updated</th>
                            <!-- <th>Barcode</th> -->
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTable"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
